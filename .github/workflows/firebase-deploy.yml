name: Build and Deploy to Firebase Hosting

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Build :web
        run: ./gradlew :web:build --no-daemon --stacktrace

      - name: Ensure firebase.json (sets hosting public folder)
        run: |
          if [ ! -f firebase.json ]; then
            cat > firebase.json <<'JSON'
{
  "hosting": {
    "public": "web/build/distributions",
    "ignore": ["firebase.json", "**/.*", "**/node_modules/**"]
  }
}
JSON
          fi

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          if [ -z "$FIREBASE_TOKEN" ] || [ -z "$PROJECT_ID" ]; then
            echo "Missing FIREBASE_TOKEN or FIREBASE_PROJECT_ID secret" && exit 1
          fi
          firebase deploy --only hosting --project "$PROJECT_ID" --token "$FIREBASE_TOKEN"
