name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          df -h

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: |
          sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rafeeq-app-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK to Appetize.io
        run: |
          RESPONSE=$(curl -s -F "file=@app/build/outputs/apk/debug/app-debug.apk" -F "token=tok_ix7jnc7maeqoshspri7ogtow5m" https://api.appetize.io/v1/apps)
          PUBLIC_KEY=$(echo $RESPONSE | grep -o '"publicKey":"[^"]*' | grep -o '[^"]*$')
          echo "=========================================================="
          echo "🎉 APP UPLOADED TO APPETIZE.IO SUCCESSFULLY!"
          echo "🔗 YOUR DIRECT LINK TO VIEW THE APP IN BROWSER IS:"
          echo "https://appetize.io/app/$PUBLIC_KEY"
          echo "=========================================================="
